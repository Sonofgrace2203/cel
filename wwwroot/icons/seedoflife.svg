<?xml version="1.0"?>
<svg width="100%" height="100%" viewBox="0 0 520 520"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink">

  <desc>
    Seed of Life
    
    handcoded by Jay Nick
    STEAMcoded.org
  </desc>
  
  <g style="fill:none;stroke:black;stroke-width:3px;" transform="translate(10,10)">
    <circle cx="250" cy="250" r="250" style="display:initial;" />

    <circle cx="250" cy="250" r="125" />
    <g style="fill:lime;fill-opacity:0.3;">
      <g id="c1">
        <circle cx="125" cy="250" r="125" />
        <circle cx="375" cy="250" r="125" />
      </g>
    </g>
    <use xlink:href="#c1" transform="rotate(60,250,250)" style="fill:blue;fill-opacity:0.3;" />
    <use xlink:href="#c1" transform="rotate(120,250,250)" style="fill:red;fill-opacity:0.3;" />
  </g>
</svg>